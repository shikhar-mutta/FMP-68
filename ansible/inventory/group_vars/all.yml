---
# FMP-68 — Ansible Group Variables (apply to all hosts)

# ── Docker Registry ──────────────────────────────────────────────────────────
docker_registry: "shikhar68"
image_tag: "latest"

# ── Project paths ────────────────────────────────────────────────────────────
project_dir: "/home/shikhar/Sem 2/SPE/SPE Main Project/FMP-68"
compose_file: "{{ project_dir }}/docker-compose.yml"

# ── Service image names ───────────────────────────────────────────────────────
images:
  auth_service:      "{{ docker_registry }}/fmp68-auth-service"
  user_service:      "{{ docker_registry }}/fmp68-user-service"
  paths_service:     "{{ docker_registry }}/fmp68-paths-service"
  follow_service:    "{{ docker_registry }}/fmp68-follow-service"
  tracking_service:  "{{ docker_registry }}/fmp68-tracking-service"
  api_gateway:       "{{ docker_registry }}/fmp68-api-gateway"
  frontend:          "{{ docker_registry }}/fmp68-frontend"

# ── Container names (must match docker-compose.yml) ──────────────────────────
containers:
  auth:     "fmp68-auth"
  user:     "fmp68-users"
  paths:    "fmp68-paths"
  follow:   "fmp68-follow"
  tracking: "fmp68-tracking"
  gateway:  "fmp68-gateway"
  frontend: "fmp68-frontend"

# ── Notification ─────────────────────────────────────────────────────────────
notify_email: "shikharmutta67@gmail.com"

# ── ELK ──────────────────────────────────────────────────────────────────────
elk_compose_file: "{{ project_dir }}/elk/docker-compose.elk.yml"
elasticsearch_port: 9200
kibana_port: 5601
logstash_port: 5044

# ── Vault ─────────────────────────────────────────────────────────────────────
vault_addr: "http://localhost:8200"
vault_port: 8200
