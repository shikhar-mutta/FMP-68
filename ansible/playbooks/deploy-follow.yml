---
# FMP-68 — Deploy follow-service only
# Called by Jenkins job: fmp68-follow-service

- name: Deploy follow-service
  hosts: fmp68_servers
  gather_facts: no
  roles:
    - role: app
      vars:
        service_name:    "follow-service"
        image_name:      "{{ images.follow_service }}"
        compose_service: "follow-service"
        container_name:  "{{ containers.follow }}"
