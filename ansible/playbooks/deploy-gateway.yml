---
# FMP-68 — Deploy api-gateway only
# Called by Jenkins job: fmp68-api-gateway

- name: Deploy api-gateway
  hosts: fmp68_servers
  gather_facts: no
  roles:
    - role: app
      vars:
        service_name:    "api-gateway"
        image_name:      "{{ images.api_gateway }}"
        compose_service: "api-gateway"
        container_name:  "{{ containers.gateway }}"
