---
# FMP-68 — Deploy user-service only
# Called by Jenkins job: fmp68-user-service

- name: Deploy user-service
  hosts: fmp68_servers
  gather_facts: no
  roles:
    - role: app
      vars:
        service_name:    "user-service"
        image_name:      "{{ images.user_service }}"
        compose_service: "user-service"
        container_name:  "{{ containers.user }}"
