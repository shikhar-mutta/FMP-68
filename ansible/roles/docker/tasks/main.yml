---
# Role: docker — Install and configure Docker Engine + Docker Compose plugin

- name: Update apt package index
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install required packages for Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present
  become: yes

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: yes

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: yes

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
    update_cache: yes
  become: yes
  notify: restart docker

- name: Ensure Docker service is enabled and running
  systemd:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Install Docker Python SDK (for Ansible docker modules)
  pip:
    name:
      - docker
      - docker-compose
    state: present
  become: yes

- name: Add current user to docker group (no sudo needed)
  user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    groups: docker
    append: yes
  become: yes
  notify: restart docker
