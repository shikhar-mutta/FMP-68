---
# Role: monitoring — Start/update the ELK stack

- name: Create ELK log directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ project_dir }}/elk/logstash/pipeline"
    - "{{ project_dir }}/elk/logstash/config"
    - "{{ project_dir }}/elk/filebeat"

- name: Set vm.max_map_count for Elasticsearch (required)
  sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: yes
  become: yes

- name: Start ELK stack via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ project_dir }}"
    files:
      - docker-compose.yml
      - elk/docker-compose.elk.yml
    state: present
    pull: always
  register: elk_result

- name: Wait for Elasticsearch to be healthy
  uri:
    url: "http://localhost:{{ elasticsearch_port }}/_cluster/health"
    method: GET
    status_code: 200
    timeout: 10
  register: es_health
  until: >
    es_health.status == 200 and
    (es_health.json.status == 'green' or es_health.json.status == 'yellow')
  retries: 20
  delay: 10

- name: Wait for Kibana to be ready
  uri:
    url: "http://localhost:{{ kibana_port }}/api/status"
    method: GET
    status_code: 200
    timeout: 10
  register: kibana_health
  until: kibana_health.status == 200
  retries: 20
  delay: 10

- name: ELK stack status
  debug:
    msg: |
      ✅ ELK Stack is running:
         Elasticsearch : http://localhost:{{ elasticsearch_port }}
         Kibana        : http://localhost:{{ kibana_port }}
         Logstash      : localhost:{{ logstash_port }}
