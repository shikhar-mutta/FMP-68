---
# Role: vault — Start Vault and verify it is accessible

- name: Ensure vault config directory exists
  file:
    path: "{{ project_dir }}/vault/config"
    state: directory
    mode: '0755'

- name: Start Vault container via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ project_dir }}"
    services:
      - vault
    state: present
    pull: always
  register: vault_result
  notify: wait for vault

- name: Wait for Vault API to be reachable
  uri:
    url: "{{ vault_addr }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501, 503]
    timeout: 5
  register: vault_health
  until: vault_health.status in [200, 429, 472, 473, 501, 503]
  retries: 15
  delay: 5

- name: Check Vault init status
  uri:
    url: "{{ vault_addr }}/v1/sys/init"
    method: GET
    return_content: yes
    status_code: 200
  register: vault_init_status

- name: Show Vault status
  debug:
    msg: |
      🔐 Vault is running at {{ vault_addr }}
         Initialized : {{ vault_init_status.json.initialized }}
         UI          : {{ vault_addr }}/ui
         {% if not vault_init_status.json.initialized %}
         ⚠️  Run: bash vault/init-vault.sh  (first time only)
         {% endif %}
