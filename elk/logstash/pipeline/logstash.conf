## FMP-68 — Logstash Pipeline
## Receives logs from Filebeat (port 5044) → parses → sends to Elasticsearch

input {
  beats {
    port => 5044
  }

  # Also accept raw TCP (useful for direct app logging)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse Docker/Filebeat metadata
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Try to parse JSON log messages from NestJS
  if [message] =~ /^\{/ {
    json {
      source  => "message"
      target  => "parsed"
    }
    if [parsed][level] {
      mutate { add_field => { "log_level" => "%{[parsed][level]}" } }
    }
    if [parsed][context] {
      mutate { add_field => { "context" => "%{[parsed][context]}" } }
    }
  }

  # Add timestamp from log or fallback to ingest time
  date {
    match => ["[parsed][timestamp]", "ISO8601"]
    target => "@timestamp"
    timezone => "Asia/Kolkata"
  }

  # Tag fmp68 logs
  mutate {
    add_tag => ["fmp68"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "fmp68-logs-%{+YYYY.MM.dd}"
    # Creates a new index each day for easy rotation
  }

  # stdout for debugging (comment out in production)
  # stdout { codec => rubydebug }
}
